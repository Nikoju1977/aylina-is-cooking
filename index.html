<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aylina Cookies">
    <meta name="theme-color" content="#0a0a14">
    <title>Aylina Cookies 🎂</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a14; --bg2: #10101e; 
            --card: rgba(255,255,255,.04); 
            --border-p: rgba(255,107,157,.18); --border-c: rgba(0,229,255,.18); --border-v: rgba(167,139,250,.18);
            --pink: #ff6b9d; --pink-s: #ff9a9e; 
            --cyan: #00e5ff; --purple: #a78bfa; 
            --green: #6bcb77; --orange: #ffb347;
            --text: #e8e8f0; --muted: #6b6b88;
            --r: 16px; --rs: 10px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* FIX IOS: Bloque le fond, empêche le rebond */
        html, body { 
            height: 100%; height: -webkit-fill-available; 
            overflow: hidden; background: var(--bg); color: var(--text); 
            font-family: 'DM Sans', -apple-system, sans-serif; 
            position: fixed; width: 100%; top: 0; left: 0;
        }
        
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,107,157,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,107,157,.025) 1px, transparent 1px); background-size: 44px 44px; pointer-events: none; z-index: -1; }
        
        input, button, textarea { font-family: inherit; -webkit-appearance: none; outline: none; }
        ::-webkit-scrollbar { display: none; }

        /* --- NAVIGATION --- */
        .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 200; background: rgba(10,10,20,.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,107,157,.12); display: flex; justify-content: space-around; align-items: center; padding: 10px 0 calc(10px + var(--safe-bottom)); height: calc(65px + var(--safe-bottom)); transition: transform 0.3s ease; }
        body.keyboard-open .tab-bar { transform: translateY(100%); }

        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px; background: none; color: var(--muted); border: none; flex: 1; cursor: pointer; }
        .tab-item .tab-icon { font-size: 22px; transition: transform .2s; }
        .tab-item .tab-label { font-size: .64rem; font-weight: 600; text-transform: uppercase; }
        .tab-item.active { color: var(--pink); }
        .tab-item.active .tab-icon { transform: scale(1.15); }
        .tab-item.tab-ia.active { color: var(--cyan); }

        /* --- SCREENS --- */
        .screen { display: none; height: calc(100% - 65px - var(--safe-bottom)); overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 30px; }
        .screen.active { display: block; }
        
        .hero { text-align: center; padding: 30px 20px 20px; }
        .hero h1 { font-family: 'Fredoka One', cursive; font-size: 2.2rem; background: linear-gradient(135deg, var(--pink), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 10px; }
        .hero p { color: var(--muted); font-size: .9rem; margin-top: 5px; }
        .card { background: var(--card); border: 1px solid var(--border-p); border-radius: var(--r); padding: 20px; margin-bottom: 20px; }

        /* --- CHAT IA --- */
        #screen-ia { padding: 0; overflow: hidden; display: none; flex-direction: column; height: 100%; }
        #screen-ia.active { display: flex; }
        body:not(.keyboard-open) #screen-ia { height: calc(100% - 65px - var(--safe-bottom)); }

        .agent-header { padding: 12px 15px; background: var(--bg2); border-bottom: 1px solid rgba(0,229,255,.1); display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 10; }
        .agent-av { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, rgba(0,229,255,.15), rgba(167,139,250,.15)); border: 1px solid rgba(0,229,255,.3); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .agent-info h3 { font-family: 'Fredoka One', cursive; color: var(--cyan); font-size: 1rem; }
        .agent-info p { font-size: .75rem; color: var(--muted); }

        .profil-bar { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,.05); }
        .profil-chip { display: flex; flex-direction: column; align-items: center; min-width: 60px; padding: 5px 10px; background: rgba(167,139,250,.06); border: 1px solid var(--border-v); border-radius: 10px; flex-shrink: 0; cursor: pointer; }
        .pc-label { font-size: .55rem; font-weight: 600; text-transform: uppercase; color: var(--muted); }
        .pc-val { font-family: 'Fredoka One', cursive; font-size: .85rem; color: var(--purple); }

        .profil-edit-row { display: none; padding: 10px 15px; background: rgba(167,139,250,.04); border-bottom: 1px solid var(--border-v); gap: 10px; flex-shrink: 0; }
        .profil-edit-row.show { display: flex; }
        .profil-edit-row input { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border-v); color: var(--text); border-radius: 8px; padding: 10px; font-size: 16px; }
        .btn-sv { padding: 0 15px; border-radius: 8px; border: none; background: var(--purple); color: #fff; font-weight: bold; cursor: pointer; }

        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; }
        
        .msg { display: flex; gap: 8px; max-width: 90%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.agent { align-self: flex-start; }
        .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .8rem; align-self: flex-end; flex-shrink: 0; }
        .msg.agent .msg-av { background: rgba(0,229,255,.1); border: 1px solid var(--border-c); }
        .msg.user .msg-av { background: rgba(255,107,157,.1); border: 1px solid var(--border-p); }
        
        .bubble { padding: 12px 14px; border-radius: 14px; font-size: .9rem; line-height: 1.5; }
        .msg.agent .bubble { background: rgba(0,229,255,.08); border: 1px solid var(--border-c); border-bottom-left-radius: 4px; }
        .msg.user .bubble { background: rgba(255,107,157,.15); border: 1px solid var(--border-p); border-bottom-right-radius: 4px; }
        .bubble strong { color: var(--cyan); }
        .msg.user .bubble strong { color: var(--pink); }

        .bubble-actions { display: flex; gap: 8px; margin-top: 6px; }
        .act-btn { padding: 5px 12px; border-radius: 12px; border: none; font-size: .75rem; font-weight: bold; cursor: pointer; }
        .act-listen { background: rgba(255,107,157,.15); color: var(--pink); border: 1px solid var(--border-p); }
        .act-save { background: rgba(231,76,60,.15); color: #e74c3c; border: 1px solid rgba(231,76,60,.3); }

        /* --- ZONE DE SAISIE FIXE --- */
        .chat-input-wrapper { background: var(--bg2); border-top: 1px solid rgba(255,255,255,.05); padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); flex-shrink: 0; width: 100%; }
        body.keyboard-open .chat-input-wrapper { padding-bottom: 10px; }
        
        .sugg-bar { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; }
        .sugg-chip { background: rgba(0,229,255,.08); border: 1px solid var(--border-c); color: var(--cyan); padding: 6px 12px; border-radius: 15px; font-size: .8rem; white-space: nowrap; cursor: pointer; }
        
        .chat-input-bar { display: flex; gap: 10px; align-items: flex-end; }
        .mic-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--orange); color: white; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .mic-btn.listening { background: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        
        .chat-ta { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border-c); color: white; border-radius: 18px; padding: 12px 15px; font-size: 16px; min-height: 44px; max-height: 100px; resize: none; line-height: 1.4; }
        .chat-ta:focus { border-color: var(--cyan); background: rgba(255,255,255,.08); }
        
        .send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg, #007c8a, var(--cyan)); color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- AUTRES --- */
        .ig { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .ig label { font-size: .75rem; color: var(--muted); text-transform: uppercase; font-weight: bold; }
        .ig input { background: rgba(255,255,255,.05); border: 1px solid var(--border-p); color: white; padding: 12px; border-radius: 8px; font-size: 16px; }
        .btn-p { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--pink), var(--pink-s)); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: rgba(255,107,157,.1); border: 1px solid var(--border-p); display: none; }
        .result-box.show { display: block; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,.05); padding-bottom: 5px;}
        .stat-val { font-family: 'Fredoka One'; color: var(--cyan); font-size: 1.2rem; }

        .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
        .rec-card { background: var(--card); border: 1px solid var(--border-p); border-radius: 12px; padding: 15px; }
        .cat-tag { font-size: .65rem; background: rgba(255,107,157,.15); color: var(--pink); padding: 3px 8px; border-radius: 8px; text-transform: uppercase; font-weight: bold; }
        .rec-titre { font-family: 'Fredoka One'; margin: 8px 0; font-size: 1rem; }
        .gluc-badge { background: rgba(107,203,119,.15); color: var(--green); padding: 3px 8px; border-radius: 8px; font-size: .75rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="screen active" id="screen-calc">
        <div class="hero"><span class="hero-emoji">🧮</span><h1>Calculateur</h1><p>Glucides & Insuline</p></div>
        <div style="padding:0 20px;max-width:500px;margin:0 auto">
            <div class="card">
                <div class="ig"><label>🍰 Glucides totaux du gâteau (g)</label><input type="number" id="totalG" placeholder="ex : 120" inputmode="decimal"></div>
                <div class="ig"><label>✂️ Nombre de parts</label><input type="number" id="nbParts" placeholder="ex : 8" inputmode="decimal"></div>
                <div class="ig"><label>💉 Ratio insuline (g/U)</label><input type="number" id="ratioI" placeholder="ex : 10 (optionnel)" inputmode="decimal"></div>
                <button class="btn-p" onclick="doCalc()">Calculer ma part 🧮</button>
                <div class="result-box" id="calcResult">
                    <div class="stat"><span style="color:var(--muted)">Glucides/part</span><span class="stat-val" id="resG">—</span></div>
                    <div class="stat" style="border:none;margin:0;padding:0"><span style="color:var(--muted)">Dose estimée</span><span class="stat-val" id="resD">—</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="screen" id="screen-ia">
        <div class="agent-header">
            <div class="agent-av">🧑‍🍳</div>
            <div class="agent-info"><h3>Chef Mistral</h3><p>Spécialiste DT1</p></div>
            <button onclick="resetChat()" style="margin-left:auto;background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:5px 12px;border-radius:15px;font-size:.75rem;cursor:pointer;">🗑 Reset</button>
        </div>

        <div class="profil-bar" id="profilBar">
            <div class="profil-chip" onclick="editField('apikey')" style="border-color: var(--pink)"><span class="pc-label">Clé API</span><span class="pc-val" id="pv-apikey" style="color:var(--pink)">🗝️ Ajouter</span></div>
            <div class="profil-chip" onclick="editField('prenom')"><span class="pc-label">Prénom</span><span class="pc-val" id="pv-prenom">—</span></div>
            <div class="profil-chip" onclick="editField('age')"><span class="pc-label">Âge</span><span class="pc-val" id="pv-age">—</span></div>
            <div class="profil-chip" onclick="editField('allergies')"><span class="pc-label">Allergies</span><span class="pc-val" id="pv-allergies">—</span></div>
        </div>
        
        <div class="profil-edit-row" id="profilEditRow">
            <input type="text" id="profilInput">
            <button class="btn-sv" onclick="saveProfil()">✓ OK</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input-wrapper">
            <div class="sugg-bar">
                <button class="sugg-chip" onclick="useSugg(this)">Cookies IG bas 🍪</button>
                <button class="sugg-chip" onclick="useSugg(this)">Gâteau chocolat 🍫</button>
                <button class="sugg-chip" onclick="useSugg(this)">Dessert post-hypo 📉</button>
            </div>
            <div class="chat-input-bar">
                <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
                <textarea class="chat-ta" id="chatInput" placeholder="Ton gâteau de rêve..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
            </div>
        </div>
    </div>

    <div class="screen" id="screen-rec">
        <div class="hero"><span class="hero-emoji">🍓</span><h1>La Vitrine</h1></div>
        <div style="padding:0 20px;max-width:600px;margin:0 auto" id="recGrid" class="rec-grid"></div>
    </div>

    <div class="screen" id="screen-fav">
        <div class="hero"><span class="hero-emoji">❤️</span><h1>Carnet Secret</h1></div>
        <div style="padding:0 20px;max-width:600px;margin:0 auto" id="favList"></div>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="goTab('calc')"><span class="tab-icon">🧮</span><span class="tab-label">Calcul</span></button>
        <button class="tab-item tab-ia" onclick="goTab('ia')"><span class="tab-icon">✨</span><span class="tab-label">Chef IA</span></button>
        <button class="tab-item" onclick="goTab('rec')"><span class="tab-icon">🍓</span><span class="tab-label">Vitrine</span></button>
        <button class="tab-item" onclick="goTab('fav')"><span class="tab-icon">❤️</span><span class="tab-label" id="favBadge">Favoris</span></button>
    </nav>

    <script>
        // --- 1. LE FIX ULTIME JAVASCRIPT POUR SAFARI IOS ---
        if (window.visualViewport) {
            const resizeHandler = () => {
                document.body.style.height = window.visualViewport.height + 'px';
                const chatBox = document.getElementById('chatBox');
                if (chatBox && document.body.classList.contains('keyboard-open')) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
                window.scrollTo(0,0);
            };
            window.visualViewport.addEventListener('resize', resizeHandler);
            resizeHandler();
        }

        // --- 2. NAVIGATION ---
        const SCREENS = ['calc', 'ia', 'rec', 'fav'];
        function goTab(tab) {
            SCREENS.forEach(k => document.getElementById('screen-'+k).classList.toggle('active', k===tab));
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(tab==='rec') renderRec();
            if(tab==='fav') renderFavs();
        }

        // --- 3. GESTION DU CLAVIER IOS ---
        const chatInput = document.getElementById('chatInput');
        chatInput.addEventListener('focus', () => { document.body.classList.add('keyboard-open'); });
        chatInput.addEventListener('blur', () => { document.body.classList.remove('keyboard-open'); });
        chatInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            document.getElementById('sendBtn').disabled = this.value.trim() === '';
        });

        // --- 4. DEBLOCAGE AUDIO IOS ---
        let audioUnlocked = false;
        document.body.addEventListener('touchstart', function() {
            if(!audioUnlocked) {
                try { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); audioUnlocked = true; } catch(e){}
            }
        }, {once:true});

        // --- 5. PROFIL & API KEY ---
        let profil = JSON.parse(localStorage.getItem('ac_profil')||'{}');
        let editingField = null;

        function renderProfil() {
            document.getElementById('pv-apikey').textContent = profil.apikey ? '••••••••' : '🗝️ Ajouter';
            document.getElementById('pv-prenom').textContent = profil.prenom || '—';
            document.getElementById('pv-age').textContent = profil.age || '—';
            document.getElementById('pv-allergies').textContent = profil.allergies || '—';
        }
        
        function editField(field) {
            editingField = field;
            document.getElementById('profilEditRow').classList.add('show');
            const inp = document.getElementById('profilInput');
            inp.type = field === 'apikey' ? 'password' : 'text';
            inp.value = profil[field]||'';
            inp.placeholder = "Saisir " + field;
            inp.focus();
        }
        
        function saveProfil() {
            if(!editingField) return;
            profil[editingField] = document.getElementById('profilInput').value.trim();
            localStorage.setItem('ac_profil', JSON.stringify(profil));
            renderProfil();
            document.getElementById('profilEditRow').classList.remove('show');
        }

        // --- 6. CALCULATEUR ---
        function doCalc() {
            const total = parseFloat(document.getElementById('totalG').value);
            const parts = parseFloat(document.getElementById('nbParts').value);
            const ratio = parseFloat(document.getElementById('ratioI').value);
            if(!total || !parts) return;
            document.getElementById('resG').textContent = (total/parts).toFixed(1)+'g';
            document.getElementById('resD').textContent = ratio>0 ? ((total/parts)/ratio).toFixed(1)+'U' : '—';
            document.getElementById('calcResult').classList.add('show');
        }

        // --- 7. CHAT MISTRAL ---
        let chatHistory = [];
        function useSugg(el) { chatInput.value = el.textContent.replace(/[🍪🍫📉🎂]/g,''); chatInput.focus(); document.getElementById('sendBtn').disabled=false; }

        function appendMsg(role, text) {
            const box = document.getElementById('chatBox');
            const isUser = role==='user';
            const mid = 'msg-'+Date.now();
            let html = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
            let actions = isUser ? '' : `<div class="bubble-actions"><button class="act-btn act-listen" onclick="ttsSpeak(this,'${mid}')">🔊 Lire</button><button class="act-btn act-save" onclick="saveFav('${mid}')">❤️ Garder</button></div>`;
            box.innerHTML += `<div class="msg ${isUser?'user':'agent'}"><div class="msg-av">${isUser?'👤':'🧑‍🍳'}</div><div><div class="bubble" id="${mid}">${html}</div>${actions}</div></div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const text = chatInput.value.trim();
            if(!text) return;
            const apiKey = profil.apikey ? profil.apikey.trim() : '';
            if(!apiKey) return appendMsg('agent', "⚠️ Il me manque la **Clé API Mistral**. Remplis-la dans la barre juste au-dessus !");

            chatInput.value=''; chatInput.style.height='44px'; document.getElementById('sendBtn').disabled=true;
            appendMsg('user', text);
            chatHistory.push({role:'user', content:text});

            const sysPrompt = `Tu es Chef Mistral, pâtissier pour enfants DT1. Enfant: ${profil.prenom||'Aylina'}. Donne une recette courte IG bas avec estimation des glucides/part. Utilise des balises HTML (<br>, <strong>). Interdiction formelle d'utiliser du Markdown ou des listes avec tirets (-).`;

            try {
                const r = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer ' + apiKey},
                    body:JSON.stringify({ model:'mistral-small-latest', messages:[{role:'system',content:sysPrompt}, ...chatHistory] })
                });
                if(r.status === 401) return appendMsg('agent', "❌ Ta clé API semble invalide.");
                const d = await r.json();
                const reply = d.choices[0].message.content;
                chatHistory.push({role:'assistant', content:reply});
                appendMsg('agent', reply);
            } catch(e) { appendMsg('agent', '❌ Erreur serveur.'); }
        }

        function resetChat() { chatHistory=[]; document.getElementById('chatBox').innerHTML=''; appendMsg('agent', "Bonjour ! Que veux-tu cuisiner aujourd'hui ? 🍪"); }

        // --- 8. MICROPHONE SAFARI ---
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition, micActive=false;
        if(SpeechRec) {
            recognition = new SpeechRec(); recognition.lang='fr-FR'; recognition.continuous=false;
            recognition.onstart = () => { micActive=true; document.getElementById('micBtn').classList.add('listening'); };
            recognition.onresult = e => { chatInput.value = e.results[0][0].transcript; document.getElementById('sendBtn').disabled=false; };
            recognition.onend = () => { micActive=false; document.getElementById('micBtn').classList.remove('listening'); };
            recognition.onerror = e => { micActive=false; document.getElementById('micBtn').classList.remove('listening'); if(e.error==='not-allowed') alert("Microphone bloqué par Apple."); };
        }
        function toggleMic() { if(!SpeechRec) return alert("Micro non supporté."); micActive ? recognition.stop() : recognition.start(); }

        // --- 9. TEXT TO SPEECH ---
        function ttsSpeak(btn, id) {
            window.speechSynthesis.cancel();
            const textToRead = document.getElementById(id).innerText.replace(/[🎂🍪✨💡📊🧑‍🍳❤️]/g,'');
            const u = new SpeechSynthesisUtterance(textToRead); 
            u.lang='fr-FR'; u.rate=0.95;
            if(/iPhone|iPad/i.test(navigator.userAgent)){ const t = setInterval(()=>{ window.speechSynthesis.speaking ? window.speechSynthesis.resume() : clearInterval(t); }, 5000); }
            window.speechSynthesis.speak(u);
        }

        // --- 10. FAVORIS ---
        let favs = JSON.parse(localStorage.getItem('ac_favs')||'[]');
        function saveFav(id) { favs.unshift({ id:Date.now(), text: document.getElementById(id).innerHTML, date: new Date().toLocaleDateString() }); localStorage.setItem('ac_favs', JSON.stringify(favs)); renderFavTabBadge(); alert("❤️ Recette sauvegardée !"); }
        function deleteFav(id) { favs = favs.filter(f=>f.id!==id); localStorage.setItem('ac_favs', JSON.stringify(favs)); renderFavs(); renderFavTabBadge(); }
        
        function renderFavs() {
            const list = document.getElementById('favList');
            if(!favs.length) return list.innerHTML = '<div class="card" style="text-align:center;color:var(--muted)">Ton carnet secret est vide.</div>';
            list.innerHTML = favs.map(f => `<div class="card"><div style="font-size:12px;color:var(--muted);margin-bottom:10px">${f.date}</div><div style="font-size:14px;line-height:1.5">${f.text}</div><button onclick="deleteFav(${f.id})" style="margin-top:15px;padding:8px;background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.3);border-radius:8px;width:100%;font-weight:bold;cursor:pointer">Retirer</button></div>`).join('');
        }
        function renderFavTabBadge() { document.getElementById('favBadge').textContent = favs.length ? `❤️ ${favs.length}` : 'Favoris'; }

        // --- 11. VITRINE STATIQUE ---
        const RECETTES = [{titre:"Cookies express", cat:"Gouter", g:8},{titre:"Layer Cake", cat:"Fête", g:15},{titre:"Nuage Framboise", cat:"Fruit", g:9},{titre:"Brownie Avocat", cat:"Chocolat", g:11}];
        function renderRec() { document.getElementById('recGrid').innerHTML = RECETTES.map(r=>`<div class="rec-card"><span class="cat-tag">${r.cat}</span><div class="rec-titre">${r.titre}</div><span class="gluc-badge">~${r.g}g/part</span></div>`).join(''); }

        // --- INITIALISATION ---
        renderProfil(); renderFavTabBadge(); resetChat(); renderRec(); renderFavs();
    </script>
</body>
</html>
